<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 200vh;
        }
        h1{
            position: sticky;
            top: 0;
        }      
        h1{
            border: 5px solid rgb(34, 73, 112);
            border-radius: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-top: 10px;
            padding: 15px 20px 25px 30px;
            margin-right: 10px; 
            margin-bottom: 10px;  
            margin: 15px 20px 25px 30px;    
            text-align: center;  
            background-image: url(../Assets/image.png);
            background-position: 10px;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }
        body{
     background-image: url(../Assets/image.png);
     background-repeat: no-repeat;
     background-size: cover;               
     background-attachment: fixed; 
   
        }
        h1{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: rgb(199, 58, 58);
        }
        a{
            text-decoration: none;
        }
        a{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: beige;
            font-size: x-large;
        }
        a{
           position: fixed;
           bottom: 0;
           right: 0;
           background-color: brown;
           color: beige;   
           border-radius: 5px;     
           padding-bottom: 5px;   
           padding-left: 10px;
           padding-right: 10px;
           padding-top: 5px;
           margin-left: 10px;
           margin-right: 10px;
           margin-bottom: 10px;
        }
        a:hover{
            background-color: goldenrod;
            color: black;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-attachment: fixed;
        }
        h1:hover{
            background-color: bisque;
            color: goldenrod;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }       
    </style>
</head>
<body>
    <h1><i>Superman</i></h1>
    <a href=https://www.youtube.com/ target="_blank"><i>Superman</i></a>
       
</body>
</html>
